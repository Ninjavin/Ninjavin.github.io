{% assign projects = site.projects | sort: "order" %}

<div class="row mt-5">
  {% for project in projects %}
  <div class="col-md-6 col-lg-4 mb-4 wow animated fadeIn" data-wow-delay=".15s">
    <a href="{{ project.external_url }}" class="project card text-themed h-100">
      {% if project.image %}
      <img
        id="{{ project.name | slugify }}-img"
        class="card-img-top"
        src="{{ project.image }}"
        alt="{{ project.name }}"
      />
      {% endif %}
      <div class="card-body">
        <h5 id="{{ project.name | slugify }}-name" class="card-title">
          {{ project.name }}
        </h5>
        <p id="{{ project.name | slugify }}-desc" class="card-text">
          {{ project.description }}
        </p>
        {% if project.tools %}
        <p id="{{ project.name | slugify }}-tools" class="card-text">
          {% for tool in project.tools %}
          <span class="badge badge-pill text-primary border border-primary ml-1"
            >{{ tool }}</span
          >
          {% endfor %}
        </p>
        {% endif %}
      </div>
    </a>
  </div>
  {% endfor %}
</div>
